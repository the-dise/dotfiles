# -- terminal settings -------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# -- reloading config --------------------------------------------------------
unbind r
bind r source-file ~/.tmux.conf

# -- prefix key --------------------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# -- mouse settings ----------------------------------------------------------
set -g mouse on

# -- set terminal title ------------------------------------------------------
set -g set-titles on
set-option -g set-titles-string '󰌢   #h ❐ #S ● #W'

# -- status line settings ----------------------------------------------------
set -g status-interval 10

# -- session sorting ---------------------------------------------------------
bind s choose-tree -sZ -O name

# -- pane navigation (vim style) ---------------------------------------------
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# -- pane and window indexing ------------------------------------------------
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# -- split windows with current path -----------------------------------------
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# -- plugins -----------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'christoomey/vim-tmux-navigator'

# -- Catppuccin theme settings -----------------------------------------------
set -g @catppuccin_flavour 'mocha'
set -g @catppuccin_status_background ""

# Window separators
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator ""
set -g @catppuccin_window_middle_separator " █"

# Window number position
set -g @catppuccin_window_number_position "right"

# Default window settings
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"

# Current window settings
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"

# Status modules and separators
set -g @catppuccin_status_modules_right "directory user host session"
set -g @catppuccin_status_left_separator " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

# Directory text
set -g @catppuccin_directory_text "#{pane_current_path}"

# Window colors
set -g @catppuccin_window_default_color "#{thm_blue}"
set -g @catppuccin_window_default_background "#{thm_gray}"
set -g @catppuccin_window_current_color "#{thm_orange}"
set -g @catppuccin_window_current_background "#{thm_gray}"

# -- copy mode ---------------------------------------------------------------
bind Enter copy-mode

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line

# Copy to Wayland clipboard
if -b '[ "$XDG_SESSION_TYPE" = "wayland" ] && command -v wl-copy > /dev/null 2>&1' 'bind y run -b "\"\$TMUX_PROGRAM\" \${TMUX_SOCKET:+-S \"\$TMUX_SOCKET\"} save-buffer - | wl-copy"'

# -- plugin initialization ---------------------------------------------------
run '~/.tmux/plugins/tpm/tpm'

